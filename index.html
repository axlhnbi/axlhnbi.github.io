<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Saya | Web Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <img src="assets/img/profile.jpeg" alt="Foto Profil" class="profile-img" id="profilePic">
        
        <h1 id="mainTitle">Halo, Saya Nama Anda!</h1>
        <p class="tagline">Junior Web Developer | Tech Enthusiast</p>

        <div class="skills">
            <span class="skill-badge"><i class="fab fa-html5"></i> HTML</span>
            <span class="skill-badge"><i class="fab fa-css3-alt"></i> CSS</span>
            <span class="skill-badge"><i class="fab fa-js"></i> JavaScript</span>
            <span class="skill-badge"><i class="fab fa-github"></i> Git</span>
        </div>

        <hr class="separator">

        <div class="social-links">
            <a href="#" target="_blank"><i class="fab fa-github"></i></a>
            <a href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="mailto:email@example.com"><i class="fas fa-envelope"></i></a>
            <button id="themeToggle" class="btn-theme">Ganti Mode</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
